name: eComBot Capstone CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-eval-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecombot
          POSTGRES_USER: ecombot
          POSTGRES_PASSWORD: ecombot_password
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U ecombot" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - uses: actions/setup-node@v4
        with: {node-version: "22", cache: npm}
      - run: python -m pip install -r requirements.txt
      - run: python -m src.rag.embed_catalog
      - run: python -m pytest -q -p no:cacheprovider
      - run: npm install
      - name: Start evaluation API
        run: nohup python -m uvicorn src.api.app:app --host 127.0.0.1 --port 8001 > api.log 2>&1 &
      - run: npm run eval
        env:
          PROMPTFOO_API_BASE_URL: http://127.0.0.1:8001
      - run: docker build -t ecombot-capstone:${{ github.sha }} .
